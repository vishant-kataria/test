<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hack AI 2.0 Project by Team The Renegades — Built in 24 hours.">
    <title>Hack AI 2.0 | The Renegades</title>
    <link rel="icon" type="image/png" href="HTML/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 2px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .gradient {
            background: linear-gradient(135deg, #8b5cf6, #06d6a0, #ff6f91);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: #8888a0;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #8b5cf6;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="HTML/assets/logo.png" alt="The Renegades" class="logo">
        <h1><span class="gradient">Hack AI 2.0</span></h1>
        <p>🚧 This is the main project page. The actual hackathon project will be built here. Stay tuned!</p>
        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem;">
            <a href="HTML/team.html" class="btn">Meet The Team →</a>
            <a href="http://localhost:8501" target="_blank" class="btn" style="background: linear-gradient(135deg, #8b5cf6, #06d6a0); color: white; border: none; box-shadow: 0 4px 15px rgba(6, 214, 160, 0.3);">Launch AI Career Coach 🚀</a>
        </div>
    </div>
</body>
</html>
